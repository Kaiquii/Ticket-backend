services:
  api:
    build: .
    container_name: ticket-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:4343@db:5432/ticket_db
      JWT_SECRET_KEY: change-this-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 4320
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ticket-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4343
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
